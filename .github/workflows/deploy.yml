name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ai-tutor-488621
  REGION: us-central1
  BACKEND_SERVICE: mathboard-backend
  FRONTEND_SERVICE: mathboard-frontend

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image
        run: |
          gcloud builds submit backend/ \
            --tag "gcr.io/$PROJECT_ID/$BACKEND_SERVICE" \
            --project "$PROJECT_ID" \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$BACKEND_SERVICE" \
            --image "gcr.io/$PROJECT_ID/$BACKEND_SERVICE" \
            --platform managed \
            --region "$REGION" \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }},GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET=${PROJECT_ID}-mathboard" \
            --project "$PROJECT_ID" \
            --quiet

      - name: Show backend URL
        run: |
          URL=$(gcloud run services describe "$BACKEND_SERVICE" \
            --region "$REGION" --project "$PROJECT_ID" \
            --format 'value(status.url)')
          echo "✅ Backend: $URL"

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image
        run: |
          gcloud builds submit frontend/ \
            --tag "gcr.io/$PROJECT_ID/$FRONTEND_SERVICE" \
            --project "$PROJECT_ID" \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$FRONTEND_SERVICE" \
            --image "gcr.io/$PROJECT_ID/$FRONTEND_SERVICE" \
            --platform managed \
            --region "$REGION" \
            --allow-unauthenticated \
            --project "$PROJECT_ID" \
            --quiet

      - name: Show frontend URL
        run: |
          URL=$(gcloud run services describe "$FRONTEND_SERVICE" \
            --region "$REGION" --project "$PROJECT_ID" \
            --format 'value(status.url)')
          echo "✅ Frontend: $URL"
